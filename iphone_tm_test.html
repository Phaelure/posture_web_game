<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TM Test</title><script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script><script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.3/dist/teachablemachine-pose.min.js"></script></head><body><h1>TM Test</h1><button id="start">Start</button><canvas id="canvas"></canvas><p id="status">ready</p><script>const URL='https://teachablemachine.withgoogle.com/models/JnAXlXAWG/';let model,webcam;document.getElementById('start').onclick=async()=>{model=await tmPose.load(URL+'model.json',URL+'metadata.json');webcam=new tmPose.Webcam(320,240,true);await webcam.setup();await webcam.play();document.getElementById('status').textContent='ok';};</script></body></html>
